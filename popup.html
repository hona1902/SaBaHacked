<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Saba Hacked v1.1.0 — by HNA Soft</title>
  <link rel="icon" type="image/png" href="Logo-HNA.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div>
      <span class="header-title">Saba Hacked</span>
      <span class="header-subtitle">v1.1.0 — HNA Soft</span>
    </div>
    <div class="header-actions">
      <button id="settings" class="btn-icon" title="Cài đặt">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
      <button id="refreshTabs" class="btn-icon" title="Refresh danh sách tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="form-group hidden">
      <label for="bizPicker">Nghiệp vụ</label>
      <select id="bizPicker"></select>
    </div>

    <div class="form-group">
      <label for="tabPicker">Tab</label>
      <select id="tabPicker" title="Chọn tab / cửa sổ"></select>
    </div>

    <textarea id="question" placeholder="Nhập hoặc paste câu hỏi..."></textarea>

    <div class="btn-row">
      <button id="pullFromPage" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Lấy dữ liệu
      </button>
      <button id="ask" class="btn btn-outline">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        Tìm đáp án
      </button>
      <button id="askAI" class="btn btn-ai" title="Gửi câu hỏi tới AI qua webhook">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L9 9l-7 1 5 5-1.5 7L12 18l6.5 4L17 15l5-5-7-1z"/>
        </svg>
        Hỏi AI
      </button>
    </div>

    <div id="results" class="results"></div>
  </div>

  <!-- Footer -->
  <div class="footer-warn">Dùng vui thôi nhé! AI vẫn có khi sai mà 😂</div>

  <!-- Hidden buttons (keep for JS compatibility) -->
  <button id="captureScreen" class="hidden"></button>
  <button id="openAsTabInline" class="hidden"></button>

  <script src="answer-bank.js"></script>
  <script src="popup.js"></script>
</body>
</html>
